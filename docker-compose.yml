version: '3.8'

services:
  hakone-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hakone-web
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - webnet
    environment:
      - TZ=Asia/Tokyo
      # nginx-proxy 路由
      - VIRTUAL_HOST=trip7.me,www.trip7.me
      - VIRTUAL_PORT=80
      # acme-companion SSL 自动申请
      - LETSENCRYPT_HOST=trip7.me,www.trip7.me
      - LETSENCRYPT_EMAIL=info@lgdhome.com

networks:
  webnet:
    external: true
