# HTTP 服务器 - 初始部署版本（证书申请前使用）
server {
    listen 80;
    server_name yuzawamd.com www.yuzawamd.com;
    root /usr/share/nginx/html;
    index index.html;

    # Let's Encrypt 证书验证路径
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # 所有 API 代理到统一的服务器（端口 5000）
    # server-booking.js 整合了所有服务：预约、聊天机器人、新闻
    location /api/ {
        proxy_pass http://160.16.67.238:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS 头（如果nginx处理CORS）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-user-id, x-user-email' always;
        add_header Access-Control-Allow-Credentials true always;

        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 主路由
    location / {
        try_files $uri $uri/ =404;
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
