<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" id="themeColor">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>パスワード再設定｜【公式】Trip7湯沢天空温泉ホテル</title>
    <link rel="icon" href="img/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modern-navbar.css?v=20251201v49">
    <link rel="stylesheet" href="css/footer.css?v=20260420b">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@100;300;400;500;700;800;900&family=DotGothic16&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .reset-password-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .reset-password-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-password-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .reset-password-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Noto Sans JP', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8a7a5e;
            box-shadow: 0 0 0 3px rgba(138, 122, 94, 0.1);
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px 30px;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #8a7a5e 0%, #9d8a6d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(138, 122, 94, 0.3);
            position: relative;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 122, 94, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn.loading {
            color: transparent;
        }

        .submit-btn.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spinner 0.8s linear infinite;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #000000;
            border-radius: 8px;
            animation: slideDown 0.3s ease;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error-message i {
            color: #ef4444;
            font-size: 18px;
        }

        .success-message {
            display: none;
            background: #d4edda;
            border-left: 4px solid #28a745;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #155724;
            border-radius: 8px;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .success-message i {
            color: #28a745;
            font-size: 18px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-match-indicator {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            align-items: center;
            gap: 8px;
        }

        .password-match-indicator.show {
            display: flex;
        }

        .password-match-indicator.match {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .password-match-indicator.mismatch {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #f8d7da;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: #8a7a5e;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-to-login a:hover {
            color: #6d5f49;
            text-decoration: underline;
        }
    </style>
    <script src="js/api-config.js"></script>
</head>
<body>
    <!-- Header Navigation Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="reset-password-container">
        <div class="reset-password-header">
            <h1>パスワード<br>再設定</h1>
            <p>新しいパスワードを入力してください</p>
        </div>

        <div class="error-message" id="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-text"></span>
        </div>

        <div class="success-message" id="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="success-text"></span>
        </div>

        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="new-password">新しいパスワード</label>
                <input type="password" id="new-password" name="newPassword" placeholder="8文字以上" required minlength="8">
                <small>※ 8文字以上で設定してください</small>
            </div>

            <div class="form-group">
                <label for="confirm-password">パスワード確認</label>
                <input type="password" id="confirm-password" name="confirmPassword" placeholder="パスワードを再入力" required>
                <div class="password-match-indicator" id="password-match-indicator">
                    <i class="fas fa-check-circle"></i>
                    <span id="password-match-text"></span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">パスワードを変更</button>
        </form>

        <div class="back-to-login">
            <a href="login.html">ログインページに戻る</a>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="js/load-navbar.js?v=20251201v21"></script>
    <script src="js/load-footer.js"></script>

    <script>
        // API配置已在 api-config.js 中设置，这里直接使用
        // window.API_BASE_URL 或 window.API_CONFIG.BOOKING_API

        // 从URL参数获取token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showError('無効なリンクです。パスワードリセットメールから正しいリンクをクリックしてください。');
            document.getElementById('resetPasswordForm').style.display = 'none';
        }

        // 实时密码匹配验证
        function setupPasswordMatchValidation() {
            const passwordInput = document.getElementById('new-password');
            const confirmInput = document.getElementById('confirm-password');
            const indicator = document.getElementById('password-match-indicator');
            const indicatorText = document.getElementById('password-match-text');
            const indicatorIcon = indicator.querySelector('i');

            function validatePasswordMatch() {
                const password = passwordInput.value;
                const confirm = confirmInput.value;

                if (confirm === '') {
                    indicator.classList.remove('show', 'match', 'mismatch');
                    return;
                }

                indicator.classList.add('show');

                if (password === confirm) {
                    indicator.classList.remove('mismatch');
                    indicator.classList.add('match');
                    indicatorIcon.className = 'fas fa-check-circle';
                    indicatorText.textContent = 'パスワードが一致します';
                } else {
                    indicator.classList.remove('match');
                    indicator.classList.add('mismatch');
                    indicatorIcon.className = 'fas fa-times-circle';
                    indicatorText.textContent = 'パスワードが一致しません';
                }
            }

            passwordInput.addEventListener('input', validatePasswordMatch);
            confirmInput.addEventListener('input', validatePasswordMatch);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            setupPasswordMatchValidation();
        });

        // 显示错误信息
        function showError(message) {
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorMessage.classList.add('show');

            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // 显示成功信息
        function showSuccess(message) {
            const successMessage = document.getElementById('success-message');
            const successText = document.getElementById('success-text');
            successText.textContent = message;
            successMessage.classList.add('show');
        }

        // 隐藏错误信息
        function hideError() {
            document.getElementById('error-message').classList.remove('show');
        }

        // 表单提交
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            hideError();

            const formData = new FormData(e.target);
            const newPassword = formData.get('newPassword');
            const confirmPassword = formData.get('confirmPassword');

            // 验证密码匹配
            if (newPassword !== confirmPassword) {
                showError('パスワードが一致しません。もう一度確認してください。');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            try {
                const response = await fetch(`${window.API_BASE_URL}/auth/password-reset/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        newPassword: newPassword
                    })
                });

                const result = await response.json();

                if (!result.success) {
                    showError(result.message || 'パスワードの変更に失敗しました');
                    return;
                }

                // 显示成功消息
                showSuccess(result.message);

                // 隐藏表单
                document.getElementById('resetPasswordForm').style.display = 'none';

                // 3秒后跳转到登录页
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (error) {
                console.error('パスワードリセットエラー:', error);
                showError('パスワードの変更に失敗しました。もう一度お試しください。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
