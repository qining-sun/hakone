<body>

        <div class="hero-content">

    <!-- Breadcrumb Navigation -->
    <div class="breadcrumb-section">

    <!-- Page Content -->
    <div class="page-content">

        <!-- Map and Hotel Contact Combined Section -->
        <section class="map-hotel-combined-section">
            <div class="map-hotel-grid">
                <!-- Left - Map (5fr) -->
                <div class="map-area">

                </div>

                <!-- Middle - Hotel Contact Info (2fr) -->
                <div class="hotel-contact-area">
                    <h2 class="contact-main-title">Trip7箱根仙石原温泉ホテル</h2>

                    <div class="contact-details">
                        <div class="contact-item-alt">
                            <div class="contact-icon">

                            <div class="contact-text">
                                <div class="contact-label">メールアドレス</div>
                                <a href="mailto:info@lgdhome.com" class="contact-value">info@lgdhome.com</a>

                                <i class="fas fa-map-marker-alt"></i>
                            </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
    });
    </script>

    <style>
        /* Map and Hotel Contact Combined Section */
        .map-hotel-combined-section {
            background: #4a6c7a;
            padding: 0;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
            position: relative;
            overflow: hidden;
        }

        .map-hotel-grid {
            display: grid;
            grid-template-columns: 5fr 2fr 3fr;
            min-height: 600px;
        }

        /* Left - Map Area */
        .map-area {
            position: relative;
            height: 100%;
        }

        .map-area .map-container {
            width: 100%;
            height: 100%;
            min-height: 600px;
        }

        .map-area .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Middle - Hotel Contact Area */
        .hotel-contact-area {
            background: #4a6c7a;
            color: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hotel-contact-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(239, 64, 70, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Right - Hotel Image Area */
        .hotel-image-area {
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        .hotel-image-area .hotel-contact-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 0;
        }

        /* Contact Details Styling */
        .contact-main-title {
            font-size: 24px;
            font-weight: 300;
            color: white;
            margin-bottom: 8px;
            font-family: 'Noto Sans JP', sans-serif;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 1;
            line-height: 1.3;
        }

        .contact-tagline {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0;
            font-weight: 300;
            font-family: 'Noto Sans JP', sans-serif;
            position: relative;
            z-index: 1;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 25px;
            position: relative;
            z-index: 1;
        }

        .contact-item-alt {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-item-alt:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .contact-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .contact-icon i {
            color: #ffffff;
            font-size: 16px;
        }

        .contact-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .contact-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .contact-value {
            font-size: 14px;
            color: white;
            font-weight: 400;
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 1.4;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-value:hover {
            color: #ef4046;
        }

        /* Responsive for Map-Hotel Section */
        @media (max-width: 992px) {
            .map-hotel-grid {
                grid-template-columns: 1fr;
            }

            .map-area .map-container {
                min-height: 500px;
            }

            .hotel-contact-area {
                padding: 40px 30px;
            }

            .hotel-image-area {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .map-area .map-container {
                min-height: 400px;
            }

            .hotel-contact-area {
                padding: 30px 20px;
            }

            .hotel-image-area {
                min-height: 300px;
            }

            .contact-main-title {
                font-size: 22px;
            }

            .contact-tagline {
                font-size: 11px;
            }

            .contact-details {
                gap: 18px;
                margin-top: 20px;
            }

            .contact-icon {
                width: 36px;
                height: 36px;
            }

            .contact-icon i {
                font-size: 14px;
            }

            .contact-value {
                font-size: 13px;
            }

            .contact-item-alt {
                gap: 12px;
                padding-bottom: 15px;
            }
        }

        /* Breadcrumb Navigation Styles */
        .breadcrumb-section {
            background: #f8f9fa;
            padding: 15px 0;
            border-bottom: 1px solid #e1e1e1;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            font-family: 'Noto Sans JP', 'Microsoft YaHei', Arial, sans-serif;
            font-size: 14px;
            color: #666;
        }

        .breadcrumb a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: #D2691E;
        }

        .breadcrumb .separator {
            margin: 0 8px;
            color: #999;
        }

        .breadcrumb .current {
            color: #D2691E;
            font-weight: 500;
        }
    </style>

    <style>
        /* Hide floating booking button on access page */
        .floating-booking-btn {
            display: none !important;
        }
    </style>

    <script src="js/main.js"></script>
    <script src="js/ai-chat-service.js"></script>

            });
            console.log('✅ AI聊天机器人已初始化');
        });
    </script>
    <script src="js/session-service.js"></script>
    <script src="js/load-navbar.js?v=20251201v21"></script>
    <script src="js/load-footer.js"></script>
</body>
</html>
