# HTTP 服务器 - 用于证书验证和重定向到 HTTPS
server {
    listen 80;
    server_name yuzawamd.com www.yuzawamd.com;
    root /usr/share/nginx/html;
    index index.html;

    # Let's Encrypt 证书验证路径
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name yuzawamd.com www.yuzawamd.com;
    root /usr/share/nginx/html;
    index index.html;

    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/yuzawamd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yuzawamd.com/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 所有 API 代理到统一的服务器（端口 5000）
    # server-booking.js 整合了所有服务：预约、聊天机器人、新闻
    # 未来如需迁移 API 到其他服务器，只需修改下方 IP 地址
    location /api/ {
        proxy_pass http://160.16.67.238:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 重要：传递 Cookie
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # CORS 头 - 必须使用具体域名，不能用通配符 * （因为需要发送credentials）
        add_header Access-Control-Allow-Origin 'https://yuzawamd.com' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-user-id, x-user-email' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://yuzawamd.com';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-user-id, x-user-email';
            add_header Access-Control-Allow-Credentials 'true';
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # 主路由
    location / {
        try_files $uri $uri/ =404;
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
