# 前端由外层 nginx-proxy 终止 SSL，本容器只听 80 端口即可
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML 不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # API 代理到 booking API 服务器
    # ^~ 前缀优先于正则 location，防止 location ~* \.js$ 把 /api/shared/*.js 当静态文件拦截
    location ^~ /api/ {
        proxy_pass http://160.16.67.238:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # CORS（使用具体域名，因为要携带 credentials）
        add_header Access-Control-Allow-Origin 'https://trip7.me' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-user-id, x-user-email, X-Hotel-ID, X-DB-Environment, X-Stripe-Environment, X-API-Provider' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://trip7.me';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-user-id, x-user-email, X-Hotel-ID, X-DB-Environment, X-Stripe-Environment, X-API-Provider';
            add_header Access-Control-Allow-Credentials 'true';
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # 主路由
    location / {
        try_files $uri $uri/ =404;
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
